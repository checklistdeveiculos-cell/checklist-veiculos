
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist de Veículo</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Checklist de Veículo</h1>

<form id="checklistForm">

<label>Nome do Motorista</label>
<input type="text" id="motorista" required>

<label>Placa</label>
<input type="text" id="placa" required>

<label>KM</label>
<input type="number" id="km" required>

<label>Combustível</label>
<select id="combustivel">
<option>Cheio</option>
<option>3/4</option>
<option>Meio</option>
<option>1/4</option>
<option>Reserva</option>
</select>

<label>Pneus</label>
<select id="pneus">
<option>Bom</option>
<option>Regular</option>
<option>Ruim</option>
</select>

<label>Limpeza</label>
<select id="limpeza">
<option>Limpo</option>
<option>Regular</option>
<option>Sujo</option>
</select>

<label>Iluminação</label>
<select id="iluminacao">
<option value="ok">OK</option>
<option value="problema">Problema</option>
</select>

<div id="problemaLuz" class="hidden">
<label>Problema na luz</label>
<input type="text" id="problemaTexto">
</div>

<label>Avaria</label>
<select id="avaria">
<option value="nao">Não</option>
<option value="sim">Sim</option>
</select>

<div id="campoAvaria" class="hidden">
<label>Foto</label>
<input type="file" id="foto">
</div>

<label>Assinatura</label>
<canvas id="assinatura"></canvas>

<button type="button" id="limpar">Limpar assinatura</button>

<button type="submit">Enviar</button>

<p id="mensagem" class="hidden">Checklist enviado!</p>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
