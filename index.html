<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist Comtrasil</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<header>
<img src="logo.png" class="logo">
<h1>Checklist de Inspeção de Veículo</h1>
</header>

<form id="checklistForm">

<label for="motorista">Nome do Motorista</label>
<input type="text" id="motorista" required>

<label for="placa">Placa</label>
<input type="text" id="placa" required>

<label for="km">KM Atual</label>
<input type="number" id="km" required>

<label for="cidade">Cidade / Filial</label>
<select id="cidade" required>
<option value="">Selecione</option>
<option>Brumado/BA (Matriz)</option>
<option>Maceió/AL</option>
<option>Camaçari/BA</option>
<option>Candeias/BA</option>
<option>Fortaleza/CE</option>
<option>Viana/ES</option>
<option>Goiânia/GO</option>
<option>Timóteo/MG</option>
<option>Juiz de Fora/MG</option>
<option>Santa Luzia/MG</option>
<option>Ouro Branco/MG</option>
<option>Vitória da Conquista/BA</option>
<option>Marabá/PA</option>
<option>Recife/PE</option>
<option>João Pessoa/PB</option>
<option>Sapucaia/RJ</option>
<option>Porto Alegre/RS</option>
<option>Araquari/SC</option>
<option>Nossa Senhora do Socorro/SE</option>
<option>Sumaré/SP</option>
<option>Piracicaba/SP</option>
<option>Pindamonhangaba/SP</option>
<option value="outro">Outro</option>
</select>

<input type="text" id="cidadeOutro" class="hidden" placeholder="Digite a cidade">

<label for="combustivel">Combustível</label>
<select id="combustivel">
<option>Cheio</option>
<option>3/4</option>
<option>Meio</option>
<option>1/4</option>
<option>Reserva</option>
</select>

<label for="pneus">Estado dos Pneus</label>
<select id="pneus">
<option>Bom</option>
<option>Regular</option>
<option>Ruim</option>
</select>

<label for="iluminacao">Iluminação</label>
<select id="iluminacao">
<option value="ok">OK</option>
<option value="problema">Problema</option>
</select>

<div id="problemaLuzDiv" class="hidden">
<label>Qual problema?</label>
<select id="tipoLuz">
<option>Farol</option>
<option>Luz de Freio</option>
<option>Seta</option>
<option>Luz de Ré</option>
<option value="outro">Outro</option>
</select>

<input type="text" id="outroProblema" class="hidden" placeholder="Descreva o problema">
</div>

<label for="avaria">Existe avaria?</label>
<select id="avaria">
<option value="nao">Não</option>
<option value="sim">Sim</option>
</select>

<div id="campoAvaria" class="hidden">

<label>Fotos da avaria</label>
<input type="file" id="foto" accept="image/*" multiple capture="environment">

<label>Descrição da avaria</label>
<textarea id="descricaoAvaria"></textarea>

</div>

<label>Observações</label>
<textarea id="observacoes"></textarea>

<label>Assinatura</label>
<canvas id="assinatura"></canvas>

<button type="button" id="limpar">Limpar assinatura</button>

<button type="submit">Enviar Checklist</button>

<div id="loading" class="hidden">Enviando...</div>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
